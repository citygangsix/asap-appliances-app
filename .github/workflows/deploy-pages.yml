name: Publish ASAP Website and CRM

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: New Folder With Items/package-lock.json

      - name: Install dependencies
        working-directory: New Folder With Items
        run: npm ci

      - name: Build website and CRM
        working-directory: New Folder With Items
        run: npm run build:pages
        env:
          VITE_APP_DATA_SOURCE: ${{ vars.VITE_APP_DATA_SOURCE }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ASAP_AUTH_EMAIL: ${{ vars.VITE_ASAP_AUTH_EMAIL }}
          VITE_ASAP_AUTH_PASSWORD_SHA256: ${{ secrets.VITE_ASAP_AUTH_PASSWORD_SHA256 }}
          VITE_LOCAL_OPERATIONS_SERVER_URL: ${{ vars.VITE_LOCAL_OPERATIONS_SERVER_URL }}

      - name: Publish generated site to gh-pages
        shell: bash
        run: |
          set -euo pipefail

          publish_dir="$(mktemp -d)"
          cp -R "New Folder With Items/dist-pages/." "$publish_dir"/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --track origin/gh-pages

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$publish_dir"/. .
          git add -A

          if git diff --cached --quiet; then
            echo "No GitHub Pages changes to publish."
          else
            git commit -m "Deploy website and dashboard"
            git push origin gh-pages
          fi
