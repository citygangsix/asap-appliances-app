name: Publish ASAP Website and CRM

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production Pages env
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          missing=0
          if [ -z "${VITE_SUPABASE_URL:-}" ]; then
            echo "::error::Missing repository variable VITE_SUPABASE_URL. Set it in Settings > Secrets and variables > Actions > Variables."
            missing=1
          fi

          if [ -z "${VITE_SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Missing repository secret VITE_SUPABASE_ANON_KEY. Set it in Settings > Secrets and variables > Actions > Secrets."
            missing=1
          fi

          exit "$missing"

      - name: Build website and CRM
        run: npm run build:pages:hosted
        env:
          VITE_APP_DATA_SOURCE: supabase
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_LOCAL_OPERATIONS_SERVER_URL: ${{ vars.VITE_LOCAL_OPERATIONS_SERVER_URL }}

      - name: Publish generated site to gh-pages
        shell: bash
        run: |
          set -euo pipefail

          publish_dir="$(mktemp -d)"
          cp -R dist-pages/. "$publish_dir"/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --track origin/gh-pages

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$publish_dir"/. .
          git add -A

          if git diff --cached --quiet; then
            echo "No GitHub Pages changes to publish."
          else
            git commit -m "Deploy website and dashboard"
            git push origin gh-pages
          fi
