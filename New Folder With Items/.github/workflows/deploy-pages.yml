name: Deploy ASAP Website and CRM

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website and CRM
        run: npm run build:pages
        env:
          VITE_APP_DATA_SOURCE: ${{ vars.VITE_APP_DATA_SOURCE }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ASAP_AUTH_EMAIL: ${{ vars.VITE_ASAP_AUTH_EMAIL }}
          VITE_ASAP_AUTH_PASSWORD_SHA256: ${{ secrets.VITE_ASAP_AUTH_PASSWORD_SHA256 }}
          VITE_LOCAL_OPERATIONS_SERVER_URL: ${{ vars.VITE_LOCAL_OPERATIONS_SERVER_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
